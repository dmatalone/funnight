<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hollywood Cinema Fun Night</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.poster{
    position:relative;
    width:100%;
    max-width:1700px;
}

.poster > img{
    width:100%;
    display:block;
}

/* Video Sticker */
.video-badge{
    position:absolute;
    top:35px;
    right:-45px;

    width:260px;
    height:160px;

    transform:rotate(8deg);
    border-radius:18px;
    overflow:hidden;

    box-shadow:0 12px 30px rgba(0,0,0,.45);
    z-index:20;
}

.video-badge video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* Ticket */
.ticket{
    position:absolute;
    top:-8px;
    right:-8px;
    width:75px;
    transform:rotate(18deg);
    z-index:30;
}

@media (max-width:900px){
.video-badge{
    width:170px;
    height:105px;
    top:20px;
    right:-25px;
}
.ticket{
    width:48px;
}
}

@media (max-width:600px){
.video-badge{
    width:125px;
    height:78px;
    top:12px;
    right:-18px;
}
.ticket{
    width:38px;
}
}
</style>
</head>

<body>

<div class="poster">
    <img src="night.png" alt="Hollywood Cinema Fun Night">

    <div class="video-badge">
        <video autoplay muted loop playsinline preload="auto">
            <source src="LIVE.mp4" type="video/mp4">
        </video>

        <img src="ticket.png" class="ticket" alt="Ticket">
    </div>
</div>

</body>
</html>
