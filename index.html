<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hollywood Cinema Fun Night</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

.poster{
    position:relative;
    width:100%;
    max-width:1700px;
}

.poster img{
    width:100%;
    display:block;
}

/* LIVE VIDEO */

.live-card{

    position:absolute;

    top:30px;
    right:35px;

    width:270px;
    height:170px;

    transform:rotate(8deg);

    border-radius:18px;

    overflow:hidden;

    box-shadow:0 15px 35px rgba(0,0,0,.45);

    z-index:20;

}

.live-card video{

    width:100%;
    height:100%;
    object-fit:cover;
    display:block;

}

/* RED LIVE DOT */

.live-dot{

    position:absolute;

    top:18px;
    left:18px;

    width:18px;
    height:18px;

    background:#ff2a2a;

    border-radius:50%;

    z-index:30;

}

/* LIVE TEXT */

.live-text{

    position:absolute;

    left:50%;

    top:50%;

    transform:translate(-50%,-50%);

    color:white;

    font-size:64px;

    font-weight:900;

    font-style:italic;

    font-family:Arial Black,Arial,sans-serif;

    text-shadow:0 3px 10px rgba(0,0,0,.5);

    pointer-events:none;

    z-index:30;

}

/* TICKET */

.ticket{

    position:absolute;

    top:-12px;

    right:-10px;

    width:78px;

    transform:rotate(18deg);

    z-index:31;

}

@media(max-width:900px){

.live-card{

width:180px;
height:115px;

}

.live-text{

font-size:42px;

}

.ticket{

width:55px;

}

}

</style>

</head>

<body>

<div class="poster">

<img src="night.png" alt="Hollywood Cinema Fun Night">

<div class="live-card">

<video autoplay muted loop playsinline>

<source src="LIVE.mp4" type="video/mp4">

</video>

<div class="live-dot"></div>

<div class="live-text">
LIVE
</div>

<img src="ticket.png" class="ticket" alt="Ticket">

</div>

</div>

</body>

</html>
